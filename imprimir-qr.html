<!DOCTYPE html>
<html>
<head>
  <style>
    @page { size: 5cm 3cm; margin: 0; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 5cm;
      height: 3cm;
      gap: 0.2cm;
    }
    img { width: 2.8cm; height: 2.8cm; }
    #nombre {
      font-family: Arial, sans-serif;
      font-size: 9pt;
      word-break: break-word;
      max-width: 1.8cm;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <img id="qr" />
  <div id="nombre"></div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const data = params.get("data");
    document.getElementById("qr").src =
      "https://api.qrserver.com/v1/create-qr-code/?size=400x400&margin=0&data=" + data;
    document.getElementById("nombre").textContent = data;
  </script>
</body>
</html>
